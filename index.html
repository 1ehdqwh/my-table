<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Maker</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 6px 12px; margin: 5px; cursor: pointer; }
    table { margin-top: 20px; border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 10px; text-align: center; vertical-align: middle; }
    td { cursor: pointer; }
    .selected { background-color: #d0ebff; }
  </style>
</head>
<body>

<h2>🧾 Table Maker (Excel-like Merge)</h2>

<label>Rows: </label>
<input type="number" id="rows" value="3" min="1">

<label>Columns: </label>
<input type="number" id="cols" value="3" min="1">

<br>
<button onclick="createTable()">Create Table</button>
<button onclick="addRow()">+ Row</button>
<button onclick="deleteRow()">- Row</button>
<button onclick="addCol()">+ Col</button>
<button onclick="deleteCol()">- Col</button>
<button onclick="mergeCells()">Merge</button>
<button onclick="splitCell()">Split</button>
<button onclick="clearStorage()">Clear Saved</button>

<table id="table"></table>

<script>
let selectedCells = [];
const STORAGE_KEY = 'table-maker-data-v4';

function createTable() {
  const rows = rowsInput();
  const cols = colsInput();
  const table = document.getElementById('table');
  table.innerHTML = '';
  selectedCells = [];

  for (let i = 0; i < rows; i++) {
    const tr = document.createElement('tr');
    for (let j = 0; j < cols; j++) {
      tr.appendChild(createCell(`R${i+1}C${j+1}`));
    }
    table.appendChild(tr);
  }
  saveTable();
}

function rowsInput(){return document.getElementById('rows').value}
function colsInput(){return document.getElementById('cols').value}

function createCell(text){
  const td = document.createElement('td');
  td.contentEditable = true;
  td.innerText = text;
  td.addEventListener('click', e => { e.stopPropagation(); toggleSelect(td); });
  td.addEventListener('input', saveTable);
  return td;
}

// ===== 行列 =====
function addRow() {
  const table = document.getElementById('table');
  if (!table.rows.length) return;
  const cols = table.rows[0].cells.length;
  const tr = document.createElement('tr');
  for (let i = 0; i < cols; i++) tr.appendChild(createCell('New'));
  table.appendChild(tr);
  saveTable();
}

function deleteRow() {
  const table = document.getElementById('table');
  if (table.rows.length > 0) table.deleteRow(-1);
  saveTable();
}

function addCol() {
  const table = document.getElementById('table');
  for (let row of table.rows) row.appendChild(createCell('New'));
  saveTable();
}

function deleteCol() {
  const table = document.getElementById('table');
  for (let row of table.rows) if (row.cells.length) row.deleteCell(-1);
  saveTable();
}

// ===== 选择 =====
function toggleSelect(cell) {
  if (selectedCells.includes(cell)) {
    cell.classList.remove('selected');
    selectedCells = selectedCells.filter(c => c !== cell);
  } else {
    cell.classList.add('selected');
    selectedCells.push(cell);
  }
}

// ===== Excel风格合并（矩形） =====
function mergeCells() {
  if (selectedCells.length < 2) return alert('Select a region');

  // 不允许已有合并参与
  if (selectedCells.some(c => c.colSpan > 1 || c.rowSpan > 1)) {
    return alert('Cannot merge already merged cells');
  }

  const positions = selectedCells.map(c => ({
    cell: c,
    row: c.parentElement.rowIndex,
    col: c.cellIndex
  }));

  const rows = positions.map(p => p.row);
  const cols = positions.map(p => p.col);

  const minRow = Math.min(...rows);
  const maxRow = Math.max(...rows);
  const minCol = Math.min(...cols);
  const maxCol = Math.max(...cols);

  // 检查是否为完整矩形
  const expectedCount = (maxRow - minRow + 1) * (maxCol - minCol + 1);
  if (expectedCount !== selectedCells.length) {
    return alert('Please select a full rectangle');
  }

  const table = document.getElementById('table');
  const first = table.rows[minRow].cells[minCol];

  let text = selectedCells.map(c => c.innerText).join(' ');

  first.rowSpan = maxRow - minRow + 1;
  first.colSpan = maxCol - minCol + 1;
  first.innerText = text;

  // 删除其余单元格
  for (let r = minRow; r <= maxRow; r++) {
    for (let c = minCol; c <= maxCol; c++) {
      if (r === minRow && c === minCol) continue;
      const row = table.rows[r];
      if (row && row.cells[c]) row.cells[c].remove();
    }
  }

  clearSelection();
  saveTable();
}

// ===== 拆分 =====
function splitCell() {
  if (selectedCells.length !== 1) return alert('Select ONE cell');

  const cell = selectedCells[0];
  const rowSpan = cell.rowSpan;
  const colSpan = cell.colSpan;
  const rowIndex = cell.parentElement.rowIndex;
  const colIndex = cell.cellIndex;
  const table = document.getElementById('table');

  if (rowSpan === 1 && colSpan === 1) return alert('Not merged');

  cell.rowSpan = 1;
  cell.colSpan = 1;

  // 补齐矩形
  for (let r = 0; r < rowSpan; r++) {
    const row = table.rows[rowIndex + r];
    for (let c = 0; c < colSpan; c++) {
      if (r === 0 && c === 0) continue;
      row.insertBefore(createCell('New'), row.cells[colIndex + 1] || null);
    }
  }

  clearSelection();
  saveTable();
}

function clearSelection() {
  selectedCells.forEach(c => c.classList.remove('selected'));
  selectedCells = [];
}

// ===== 保存 =====
function saveTable() {
  const table = document.getElementById('table');
  const data = [];

  for (let row of table.rows) {
    const rowData = [];
    for (let cell of row.cells) {
      rowData.push({ text: cell.innerText, colSpan: cell.colSpan, rowSpan: cell.rowSpan });
    }
    data.push(rowData);
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadTable() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;

  const data = JSON.parse(saved);
  const table = document.getElementById('table');
  table.innerHTML = '';

  data.forEach(rowData => {
    const tr = document.createElement('tr');
    rowData.forEach(cellData => {
      const td = createCell(cellData.text);
      td.colSpan = cellData.colSpan || 1;
      td.rowSpan = cellData.rowSpan || 1;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
  alert('Cleared');
}

window.onload = loadTable;
document.body.addEventListener('click', clearSelection);
</script>

</body>
</html>
